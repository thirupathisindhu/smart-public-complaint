<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — SmartGov Admin</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar-container"></div>
        <main class="main-content">
            <div class="container">
                <div class="page-header">
                    <h1>📊 Detailed Analytics</h1>
                    <p>In-depth system performance analysis</p>
                </div>
                <div class="grid-2" id="charts">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
    <script>
        const user = Auth.requireAuth(['admin']);
        if (user) {
            document.getElementById('navbar-container').innerHTML = buildNavbar(user);
            initNotifications();
            loadAnalytics();
        }

        async function loadAnalytics() {
            try {
                const data = await api.get('/analytics/dashboard');
                const catColors = { Water: 'cat-water', Electricity: 'cat-electricity', Sanitation: 'cat-sanitation', Infrastructure: 'cat-infrastructure', Other: 'cat-other' };
                const maxCat = Math.max(...data.by_category.map(c => c.count), 1);
                const statusColors = { Submitted: 'var(--info)', Acknowledged: 'var(--cyan)', 'In Progress': 'var(--warning)', Resolved: 'var(--success)', Closed: 'var(--purple)', Rejected: 'var(--danger)' };
                const maxStatus = Math.max(...data.by_status.map(s => s.count), 1);
                const priColors = { Low: 'var(--success)', Medium: 'var(--warning)', High: 'var(--orange)', Critical: 'var(--danger)' };
                const maxPri = Math.max(...data.by_priority.map(p => p.count), 1);

                document.getElementById('charts').innerHTML = `
          <div class="chart-container">
            <h3>📊 By Category</h3>
            <div class="chart-bar-group">${data.by_category.map(c => `
              <div class="chart-bar-item"><span class="chart-bar-label">${getCategoryIcon(c.category)} ${c.category}</span>
              <div class="chart-bar"><div class="fill ${catColors[c.category] || 'cat-other'}" style="width:${(c.count / maxCat) * 100}%">${c.count}</div></div></div>
            `).join('')}</div>
          </div>
          <div class="chart-container">
            <h3>📈 By Status</h3>
            <div class="chart-bar-group">${data.by_status.map(s => `
              <div class="chart-bar-item"><span class="chart-bar-label">${s.status}</span>
              <div class="chart-bar"><div class="fill" style="width:${(s.count / maxStatus) * 100}%; background:${statusColors[s.status] || 'var(--accent)'}">${s.count}</div></div></div>
            `).join('')}</div>
          </div>
          <div class="chart-container">
            <h3>🎯 By Priority</h3>
            <div class="chart-bar-group">${data.by_priority.map(p => `
              <div class="chart-bar-item"><span class="chart-bar-label">${p.priority}</span>
              <div class="chart-bar"><div class="fill" style="width:${(p.count / maxPri) * 100}%; background:${priColors[p.priority] || 'var(--accent)'}">${p.count}</div></div></div>
            `).join('')}</div>
          </div>
          <div class="chart-container">
            <h3>🏢 Department Performance</h3>
            <div class="dept-progress">${data.by_department.map(d => {
                    const pct = d.total ? Math.round((d.resolved / d.total) * 100) : 0;
                    return `<div class="dept-item"><div class="dept-header"><span class="dept-name">${d.department}</span><span class="dept-stats">${d.resolved}/${d.total} (${pct}%)</span></div><div class="dept-bar"><div class="fill" style="width:${pct}%"></div></div></div>`;
                }).join('')}</div>
          </div>
        `;
            } catch (err) { Toast.error('Failed to load analytics'); }
        }
    </script>
</body>

</html>
