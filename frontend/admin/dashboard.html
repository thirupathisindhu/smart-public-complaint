<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — SmartGov</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar-container"></div>
        <main class="main-content">
            <div class="container">
                <div class="page-header">
                    <h1>🏛️ Admin Dashboard</h1>
                    <p>System-wide overview and analytics</p>
                </div>
                <div class="grid-4 stagger" id="kpi-cards">
                    <div class="spinner"></div>
                </div>
                <div class="grid-2" style="margin-top:32px;">
                    <div class="chart-container" id="category-chart"></div>
                    <div class="chart-container" id="dept-chart"></div>
                </div>
                <div style="margin-top:32px;">
                    <div class="card">
                        <div class="card-header">
                            <h3>📋 Recent Complaints</h3><a href="/admin/complaints.html"
                                class="btn btn-ghost btn-sm">View All →</a>
                        </div>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Title</th>
                                        <th>Citizen</th>
                                        <th>Department</th>
                                        <th>Status</th>
                                        <th>Priority</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody id="recent-table">
                                    <tr>
                                        <td colspan="7" style="text-align:center;">
                                            <div class="spinner"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer">
            <div class="container">
                <p>🏛️ SmartGov Admin Portal</p>
            </div>
        </footer>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const user = Auth.requireAuth(['admin']);
        if (user) {
            document.getElementById('navbar-container').innerHTML = buildNavbar(user);
            initNotifications();
            loadAnalytics();
        }

        async function loadAnalytics() {
            try {
                const data = await api.get('/analytics/dashboard');
                const k = data.kpi;

                document.getElementById('kpi-cards').innerHTML = `
          <div class="kpi-card accent"><div class="kpi-icon">📊</div><div class="kpi-value">${k.total_complaints}</div><div class="kpi-label">Total Complaints</div></div>
          <div class="kpi-card warning"><div class="kpi-icon">⏳</div><div class="kpi-value">${k.pending}</div><div class="kpi-label">Pending</div></div>
          <div class="kpi-card info"><div class="kpi-icon">🔧</div><div class="kpi-value">${k.in_progress}</div><div class="kpi-label">In Progress</div></div>
          <div class="kpi-card success"><div class="kpi-icon">✅</div><div class="kpi-value">${k.resolved}</div><div class="kpi-label">Resolved</div></div>
          <div class="kpi-card danger"><div class="kpi-icon">❌</div><div class="kpi-value">${k.rejected}</div><div class="kpi-label">Rejected</div></div>
          <div class="kpi-card cyan"><div class="kpi-icon">👥</div><div class="kpi-value">${k.total_citizens}</div><div class="kpi-label">Citizens</div></div>
          <div class="kpi-card purple"><div class="kpi-icon">⚙️</div><div class="kpi-value">${k.total_staff}</div><div class="kpi-label">Staff</div></div>
          <div class="kpi-card pink"><div class="kpi-icon">⭐</div><div class="kpi-value">${k.avg_rating}</div><div class="kpi-label">Avg. Rating</div></div>
        `;

                // Category Chart
                const maxCat = Math.max(...data.by_category.map(c => c.count), 1);
                const catColors = { Water: 'cat-water', Electricity: 'cat-electricity', Sanitation: 'cat-sanitation', Infrastructure: 'cat-infrastructure', Other: 'cat-other' };
                document.getElementById('category-chart').innerHTML = `
          <h3>📊 Complaints by Category</h3>
          <div class="chart-bar-group">${data.by_category.map(c => `
            <div class="chart-bar-item">
              <span class="chart-bar-label">${getCategoryIcon(c.category)} ${c.category}</span>
              <div class="chart-bar"><div class="fill ${catColors[c.category] || 'cat-other'}" style="width:${(c.count / maxCat) * 100}%">${c.count}</div></div>
            </div>
          `).join('')}</div>
        `;

                // Department Performance
                document.getElementById('dept-chart').innerHTML = `
          <h3>🏢 Department Performance</h3>
          <div class="dept-progress">${data.by_department.map(d => {
                    const pct = d.total ? Math.round((d.resolved / d.total) * 100) : 0;
                    return `<div class="dept-item">
              <div class="dept-header"><span class="dept-name">${d.department}</span><span class="dept-stats">${d.resolved}/${d.total} resolved (${pct}%)</span></div>
              <div class="dept-bar"><div class="fill" style="width:${pct}%"></div></div>
            </div>`;
                }).join('')}</div>
        `;

                // Recent Table
                document.getElementById('recent-table').innerHTML = data.recent_complaints.map(c => `
          <tr>
            <td><span style="color:var(--accent); font-weight:600;">${c.complaint_number}</span></td>
            <td>${escapeHtml(c.title.substring(0, 40))}${c.title.length > 40 ? '...' : ''}</td>
            <td>${c.citizen_name || '—'}</td>
            <td>${c.department}</td>
            <td>${getStatusBadge(c.status)}</td>
            <td>${getPriorityBadge(c.priority)}</td>
            <td>${formatDate(c.created_at)}</td>
          </tr>
        `).join('');
            } catch (err) { Toast.error('Failed to load analytics'); }
        }
    </script>
</body>

</html>
