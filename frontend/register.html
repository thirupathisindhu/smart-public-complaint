<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for SmartGov — Create your citizen or staff account">
    <title>Register — SmartGov</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card fade-in">
            <div class="logo">
                <div class="logo-icon">🏛️</div>
                <h1>SmartGov</h1>
                <p>Create your account</p>
            </div>

            <div class="role-selector" id="role-selector">
                <button class="active" data-role="citizen" onclick="selectRole('citizen')">👤 Citizen</button>
                <button data-role="staff" onclick="selectRole('staff')">⚙️ Staff</button>
            </div>

            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="full_name">Full Name</label>
                    <input type="text" class="form-control" id="full_name" placeholder="Enter your full name" required
                        minlength="2">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" placeholder="9876543210">
                    </div>
                </div>

                <div class="form-group" id="dept-group" style="display:none;">
                    <label class="form-label" for="department">Department</label>
                    <select class="form-control" id="department">
                        <option value="">Select Department</option>
                        <option value="Water Supply">💧 Water Supply</option>
                        <option value="Electricity">⚡ Electricity</option>
                        <option value="Sanitation">🗑️ Sanitation</option>
                        <option value="Infrastructure">🏗️ Infrastructure</option>
                        <option value="Administration">📋 Administration</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required
                        minlength="6" oninput="checkStrength(this.value)">
                    <div class="password-strength">
                        <div class="fill" id="pw-fill"></div>
                    </div>
                    <div class="form-hint" id="pw-hint">Use at least 6 characters with a mix of letters, numbers &
                        symbols</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password"
                        placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">🚀 Create
                    Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login.html">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        let selectedRole = 'citizen';

        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-selector button').forEach(b => b.classList.toggle('active', b.dataset.role === role));
            document.getElementById('dept-group').style.display = role === 'staff' ? 'block' : 'none';
        }

        function checkStrength(pw) {
            const fill = document.getElementById('pw-fill');
            const hint = document.getElementById('pw-hint');
            let strength = 0;
            if (pw.length >= 6) strength++;
            if (/[A-Z]/.test(pw)) strength++;
            if (/[0-9]/.test(pw)) strength++;
            if (/[^A-Za-z0-9]/.test(pw)) strength++;
            const classes = ['', 'weak', 'fair', 'good', 'strong'];
            const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
            fill.className = 'fill ' + (classes[strength] || '');
            hint.textContent = labels[strength] ? `Password Strength: ${labels[strength]}` : 'Use at least 6 characters';
        }

        async function handleRegister(e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirm_password').value;
            if (pw !== cpw) { Toast.error('Passwords do not match'); return; }

            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const body = {
                    full_name: document.getElementById('full_name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value || null,
                    password: pw,
                    role: selectedRole,
                    department: selectedRole === 'staff' ? document.getElementById('department').value : null,
                };
                if (selectedRole === 'staff' && !body.department) {
                    Toast.error('Please select a department'); btn.disabled = false; btn.textContent = '🚀 Create Account'; return;
                }
                const data = await api.post('/auth/register', body);
                Auth.setSession(data.token, data.user);
                Toast.success('Account created! Redirecting...');
                const dashMap = { citizen: '/citizen/dashboard.html', staff: '/staff/dashboard.html', admin: '/admin/dashboard.html' };
                setTimeout(() => window.location.href = dashMap[data.user.role], 800);
            } catch (err) {
                Toast.error(err.message);
                btn.disabled = false;
                btn.textContent = '🚀 Create Account';
            }
        }
    </script>
</body>

</html>
