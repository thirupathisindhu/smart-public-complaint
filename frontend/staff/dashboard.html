<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard — SmartGov</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="page-wrapper">
        <div id="navbar-container"></div>
        <main class="main-content">
            <div class="container">
                <div class="page-header">
                    <h1 id="greeting">Staff Dashboard</h1>
                    <p id="dept-label">Department complaints management</p>
                </div>
                <div class="grid-4 stagger" id="kpi-cards"></div>
                <div style="margin-top:32px;">
                    <div class="filter-bar">
                        <input type="search" class="form-control" id="search" placeholder="🔍 Search..."
                            oninput="loadComplaints()">
                        <select class="form-control" id="filter-status" onchange="loadComplaints()">
                            <option value="">All Statuses</option>
                            <option value="Submitted">Submitted</option>
                            <option value="Acknowledged">Acknowledged</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Resolved">Resolved</option>
                            <option value="Closed">Closed</option>
                        </select>
                        <select class="form-control" id="filter-priority" onchange="loadComplaints()">
                            <option value="">All Priorities</option>
                            <option value="Critical">Critical</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="complaint-list" id="complaint-list">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Status Update Modal -->
    <div class="modal-overlay" id="update-modal">
        <div class="modal" style="max-width:650px;">
            <div class="modal-header">
                <h2 id="modal-title">Complaint Details</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const user = Auth.requireAuth(['staff']);
        if (user) {
            document.getElementById('navbar-container').innerHTML = buildNavbar(user);
            document.getElementById('greeting').textContent = `⚙️ ${user.department} Dashboard`;
            document.getElementById('dept-label').textContent = `Managing complaints for ${user.department}`;
            initNotifications();
            loadComplaints();
        }

        let allComplaints = [];

        async function loadComplaints() {
            const status = document.getElementById('filter-status').value;
            const priority = document.getElementById('filter-priority').value;
            const search = document.getElementById('search').value;
            let url = '/complaints?limit=100';
            if (status) url += `&status=${status}`;
            if (priority) url += `&priority=${priority}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;

            try {
                const data = await api.get(url);
                allComplaints = data.complaints;
                renderKPIs();
                renderList();
            } catch (err) { Toast.error('Failed to load complaints'); }
        }

        function renderKPIs() {
            const c = allComplaints;
            const total = c.length;
            const pending = c.filter(x => ['Submitted', 'Acknowledged'].includes(x.status)).length;
            const inProgress = c.filter(x => x.status === 'In Progress').length;
            const resolved = c.filter(x => ['Resolved', 'Closed'].includes(x.status)).length;
            document.getElementById('kpi-cards').innerHTML = `
        <div class="kpi-card accent"><div class="kpi-icon">📋</div><div class="kpi-value">${total}</div><div class="kpi-label">Total Complaints</div></div>
        <div class="kpi-card warning"><div class="kpi-icon">⏳</div><div class="kpi-value">${pending}</div><div class="kpi-label">Pending Review</div></div>
        <div class="kpi-card info"><div class="kpi-icon">🔧</div><div class="kpi-value">${inProgress}</div><div class="kpi-label">In Progress</div></div>
        <div class="kpi-card success"><div class="kpi-icon">✅</div><div class="kpi-value">${resolved}</div><div class="kpi-label">Resolved</div></div>
      `;
        }

        function renderList() {
            const list = document.getElementById('complaint-list');
            if (!allComplaints.length) {
                list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>No complaints</h3><p>No complaints for your department yet.</p></div>';
                return;
            }
            list.innerHTML = allComplaints.map(c => `
        <div class="complaint-card" onclick="viewComplaint(${c.id})">
          <div class="complaint-info">
            <h4>${getCategoryIcon(c.category)} ${escapeHtml(c.title)}</h4>
            <div class="complaint-meta">
              <span>🔖 ${c.complaint_number}</span>
              <span>👤 ${c.citizen_name || 'Unknown'}</span>
              <span>📍 ${c.location || '—'}</span>
              <span>🕐 ${timeAgo(c.created_at)}</span>
            </div>
          </div>
          <div class="complaint-badges">
            ${getStatusBadge(c.status)}
            ${getPriorityBadge(c.priority)}
          </div>
        </div>
      `).join('');
        }

        async function viewComplaint(id) {
            try {
                const c = await api.get(`/complaints/${id}`);
                document.getElementById('modal-title').textContent = `${c.complaint_number}`;

                const statusOptions = {
                    'Submitted': ['Acknowledged', 'Rejected'],
                    'Acknowledged': ['In Progress', 'Rejected'],
                    'In Progress': ['Resolved'],
                    'Resolved': [],
                    'Closed': [],
                    'Rejected': []
                };
                const nextStatuses = statusOptions[c.status] || [];

                document.getElementById('modal-body').innerHTML = `
          <div style="display:grid; gap:16px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div><span style="color:var(--text-muted); font-size:0.8rem;">Status</span><div style="margin-top:4px;">${getStatusBadge(c.status)}</div></div>
              <div><span style="color:var(--text-muted); font-size:0.8rem;">Priority</span><div style="margin-top:4px;">${getPriorityBadge(c.priority)}</div></div>
              <div><span style="color:var(--text-muted); font-size:0.8rem;">Citizen</span><div style="margin-top:4px;">👤 ${c.citizen_name}</div></div>
              <div><span style="color:var(--text-muted); font-size:0.8rem;">Filed On</span><div style="margin-top:4px;">📅 ${formatDate(c.created_at)}</div></div>
            </div>
            <div>
              <h3 style="font-size:1.1rem; margin-bottom:8px;">${escapeHtml(c.title)}</h3>
              <p style="color:var(--text-secondary); font-size:0.9rem;">${escapeHtml(c.description)}</p>
              <p style="color:var(--text-muted); font-size:0.85rem; margin-top:8px;">📍 ${c.location || '—'}</p>
            </div>
            ${c.resolution_notes ? `<div style="padding:12px; background:var(--success-bg); border-radius:var(--radius-sm); color:var(--success);">📝 ${escapeHtml(c.resolution_notes)}</div>` : ''}

            ${nextStatuses.length ? `
            <div style="padding:20px; background:var(--bg-input); border-radius:var(--radius-md); border:1px solid var(--border);">
              <h4 style="margin-bottom:12px;">Update Status</h4>
              <div class="form-group">
                <select class="form-control" id="new-status">
                  ${nextStatuses.map(s => `<option value="${s}">${s}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <textarea class="form-control" id="status-notes" placeholder="Add notes about this update..." rows="3"></textarea>
              </div>
              <button class="btn btn-primary" onclick="updateStatus(${c.id})">Update Status</button>
            </div>` : ''}

            <div>
              <h4 style="margin-bottom:12px;">📜 Timeline</h4>
              <div class="timeline">${c.timeline.map(t => `
                <div class="timeline-item">
                  <div class="timeline-content">
                    <div class="timeline-header">
                      <span class="timeline-action">${t.action}: ${t.new_status || ''}</span>
                      <span class="timeline-time">${formatDateTime(t.created_at)}</span>
                    </div>
                    ${t.notes ? `<div class="timeline-notes">${escapeHtml(t.notes)}</div>` : ''}
                    <div class="timeline-user">by ${t.updated_by_name || 'System'}</div>
                  </div>
                </div>
              `).join('')}</div>
            </div>
          </div>
        `;
                document.getElementById('update-modal').classList.add('active');
            } catch (err) { Toast.error('Failed to load complaint'); }
        }

        function closeModal() { document.getElementById('update-modal').classList.remove('active'); }

        async function updateStatus(id) {
            try {
                const status = document.getElementById('new-status').value;
                const notes = document.getElementById('status-notes').value;
                await api.put(`/complaints/${id}/status`, { status, notes: notes || null });
                Toast.success(`Status updated to ${status}`);
                closeModal();
                loadComplaints();
            } catch (err) { Toast.error(err.message); }
        }

        document.getElementById('update-modal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });
    </script>
</body>

</html>
